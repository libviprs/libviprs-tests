name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  test:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/libviprs
          path: libviprs
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test

  test-pdfium:
    name: Integration Tests (pdfium)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/libviprs
          path: libviprs
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install PDFium
        run: |
          curl -L -o pdfium.tgz https://github.com/niclasvaneyk/pdfium-apple-silicon/releases/download/5962/pdfium-linux-x64.tgz || true
          # Fallback: skip pdfium tests if library not available
          if [ -f pdfium.tgz ]; then
            mkdir -p /usr/local/lib
            tar xzf pdfium.tgz -C /usr/local/lib
            echo "LD_LIBRARY_PATH=/usr/local/lib" >> $GITHUB_ENV
          fi
      - run: cargo test --features pdfium || echo "pdfium tests skipped (library not available)"

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/libviprs
          path: libviprs
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt -- --check
      - run: cargo clippy --all-targets -- -D warnings
