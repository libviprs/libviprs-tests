name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  test:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Clone libviprs (matching branch or main)
        run: |
          BRANCH="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
          git clone --depth 1 --branch "$BRANCH" https://github.com/${{ github.repository_owner }}/libviprs.git ../libviprs 2>/dev/null \
            || git clone --depth 1 https://github.com/${{ github.repository_owner }}/libviprs.git ../libviprs
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test

  test-pdfium:
    name: Integration Tests (pdfium)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Clone libviprs (matching branch or main)
        run: |
          BRANCH="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
          git clone --depth 1 --branch "$BRANCH" https://github.com/${{ github.repository_owner }}/libviprs.git ../libviprs 2>/dev/null \
            || git clone --depth 1 https://github.com/${{ github.repository_owner }}/libviprs.git ../libviprs
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install PDFium
        run: |
          curl -L -o pdfium.tgz https://github.com/bblanchon/pdfium-binaries/releases/download/chromium/7725/pdfium-linux-x64.tgz
          mkdir -p pdfium
          tar xzf pdfium.tgz -C pdfium
          sudo cp pdfium/lib/libpdfium.so /usr/local/lib/
          sudo cp -r pdfium/include/* /usr/local/include/
          sudo ldconfig
      - run: cargo test --features pdfium

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Clone libviprs (matching branch or main)
        run: |
          BRANCH="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
          git clone --depth 1 --branch "$BRANCH" https://github.com/${{ github.repository_owner }}/libviprs.git ../libviprs 2>/dev/null \
            || git clone --depth 1 https://github.com/${{ github.repository_owner }}/libviprs.git ../libviprs
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt -- --check
      - run: cargo clippy --all-targets -- -D warnings
